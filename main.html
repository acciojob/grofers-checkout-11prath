<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grofers Checkout</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="p-5">
  <div class="container">
    <h1 class="text-center mb-4">Grofers Checkout</h1>

    <!-- Grocery Table -->
    <table class="table table-striped" id="grocery-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="item">Apples</td>
          <td class="prices">50</td>
        </tr>
        <tr>
          <td class="item">Bananas</td>
          <td class="prices">30</td>
        </tr>
        <tr>
          <td class="item">Milk</td>
          <td class="prices">40</td>
        </tr>
      </tbody>
    </table>

    <button id="calculate" class="btn btn-primary">Calculate Total</button>
  </div>

  <script>
    const calculateBtn = document.getElementById("calculate");
    const table = document.getElementById("grocery-table");

    calculateBtn.addEventListener("click", function() {
      // Get all price elements
      const prices = document.querySelectorAll(".prices");
      let total = 0;

      prices.forEach(price => {
        total += parseFloat(price.textContent);
      });

      // Create new row for total
      const totalRow = document.createElement("tr");
      const totalCell = document.createElement("td");

      totalCell.setAttribute("colspan", "2");
      totalCell.classList.add("fw-bold", "text-center");
      totalCell.textContent = "Total Price: ₹" + total;

      totalRow.appendChild(totalCell);
      table.querySelector("tbody").appendChild(totalRow);

      // Disable button after calculation to avoid duplicate rows
      calculateBtn.disabled = true;
    });
  </script>
</body>
</html>
